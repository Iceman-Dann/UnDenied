<!DOCTYPE html>
<html>

<head>
    <title>API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <h1>UnDenied API Test</h1>
    <button onclick="testAPI()">Test Gemini API</button>
    <div id="result" class="result"></div>

    <script>
        const CONFIG = {
            GEMINI_API_KEY: 'AIzaSyDSMH0gsqlH6_dWOY6FSq-96ZIwbBGbvCM',
            GEMINI_API_URL: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent'
        };

        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing API...';

            try {
                const requestBody = {
                    contents: [{
                        parts: [{
                            text: "Hello, can you respond with 'API working' if you receive this?"
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.3,
                        maxOutputTokens: 100,
                    },
                    model: "models/gemini-1.5-flash"
                };

                const response = await fetch(CONFIG.GEMINI_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-goog-api-key': CONFIG.GEMINI_API_KEY.trim()
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error:', errorText);
                    resultDiv.innerHTML = `<strong>Error:</strong> ${response.status} - ${errorText}`;
                    return;
                }

                const data = await response.json();
                console.log('Success:', data);

                if (data.candidates && data.candidates[0]) {
                    const text = data.candidates[0].content?.parts?.[0]?.text || 'No text received';
                    resultDiv.innerHTML = `<strong>✅ API Working!</strong><br><br>Response: ${text}`;
                } else {
                    resultDiv.innerHTML = '<strong>❌ Unexpected response format</strong>';
                }

            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.innerHTML = `<strong>❌ Fetch Error:</strong> ${error.message}`;
            }
        }
    </script>
</body>

</html>
